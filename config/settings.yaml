# =====================================================================
# TankFlow Pipeline – Configuración principal
# =====================================================================
pipeline:
  timezone: "America/Bogota"
  date_format: "%d/%m/%Y %H:%M"
  thousands_sep: ","
  decimal_sep: "."

tanks:
  main_tank: "LFO - Main Tank"
  virtual_tanks:
    - "LFO - 171-TK-03"
    - "LFO - 171-TK-04"
    - "LFO - 171-TK-05"
  volume_unit: "Litres"
  volume_type: "Ambient"

analytics:
  gain_threshold: 70          # litros – umbral para detectar inflow en VT
  delivery_min_gap_minutes: 5 # gap máximo entre muestras para mismo evento
  delivery_min_volume: 500    # volumen mínimo para considerar un evento
  delivery_match_max_minutes: 120

dispenses:
  lane_columns:
    - "Lane1"
    - "Lane2"
    - "Lane3"
  meter_columns:
    - "Meter_846"
    - "Meter_847"
    - "Meter_848"

output:
  export_xlsx: true
  export_csv: true
  results_dir: "outputs/"
  log_level: "INFO"
